<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MídioPago 🐉</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;display:flex;justify-content:center;padding:20px}
.app{max-width:600px;width:100%}
.card{background:#131a2a;padding:15px;border-radius:12px;margin-bottom:12px}
button{width:100%;margin-top:8px;padding:10px;background:#1b2236;border:none;border-radius:8px;color:#fff}
.xp{height:10px;background:#1b2236;border-radius:999px;overflow:hidden}
.fill{height:100%;background:#4ADE80}
.toast{text-align:center;opacity:0;transition:.3s}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h2 id="stage"></h2>
<p id="desc"></p>

<div class="xp"><div id="bar" class="fill"></div></div>
<p id="xpText"></p>
<p id="next"></p>
</div>

<div class="card">
<button onclick="gainXP(20,'Análise de campanha')">Análise de campanha</button>
<button onclick="gainXP(15,'Relatório')">Relatório</button>
<button onclick="gainXP(15,'Publicação indevida')">Publicação indevida</button>
</div>

<div class="card">
<h3>📋 Feed do time</h3>
<div id="feed"></div>
<button onclick="loadData()">Atualizar</button>
</div>

<div class="card">
<h3>📊 Ranking</h3>
<div id="ranking"></div>
</div>

<div id="toast" class="toast"></div>

</div>

<script>

// 🔥 MULTIPLAYER ATIVO
const IS_SHARED = true;

// usuário
let user = localStorage.getItem("user") || prompt("Seu nome?");
localStorage.setItem("user", user);

let xp = Number(localStorage.getItem("xp") || 0);

// fases
const STAGES=[
{xp:0,name:"🍼 Jovem Aprendiz",desc:"Aprendendo o jogo"},
{xp:100,name:"🐣 Estagiário",desc:"Começando a executar"},
{xp:300,name:"💻 Analista",desc:"Entendendo os dados"},
{xp:700,name:"🛡️ Especialista",desc:"Elevando qualidade"},
{xp:1500,name:"🧭 Coordenador",desc:"Organizando o time"},
{xp:3000,name:"🪽 Gerente",desc:"Pensando estratégia"},
{xp:5000,name:"🧠 Superintendente",desc:"Antecipando cenários"},
{xp:8000,name:"👑 Pai de Todos",desc:"Definindo o jogo"}
];

function getStage(){
for(let i=STAGES.length-1;i>=0;i--){
if(xp>=STAGES[i].xp)return i;
}
}

// atualizar UI
function update(){
let s=getStage();
let next=STAGES[s+1];

document.getElementById("stage").innerText=STAGES[s].name;
document.getElementById("desc").innerText=STAGES[s].desc;
document.getElementById("xpText").innerText=xp+" XP";

if(next){
document.getElementById("bar").style.width=((xp-STAGES[s].xp)/(next.xp-STAGES[s].xp)*100)+"%";
document.getElementById("next").innerText="Faltam "+(next.xp-xp)+" XP";
}else{
document.getElementById("bar").style.width="100%";
document.getElementById("next").innerText="Nível máximo";
}
}

// ganhar XP
function gainXP(v,action){
xp+=v;
localStorage.setItem("xp",xp);

showToast("+"+v+" XP");

pushEntry({user, label:action, xp:v});
update();
}

// 🔥 BUSCAR DADOS (via proxy)
async function fetchData(){
  try{
    const r = await fetch('/api/proxy');
    if(!r.ok) return null;
    return await r.json();
  }catch(e){
    return null;
  }
}

// 🔥 ENVIAR DADOS
async function pushEntry(entry){
  try{
    await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: entry.label,
        xpGain: entry.xp,
        user: entry.user
      })
    });
  }catch(e){}
}

// carregar feed + ranking
async function loadData(){
const data = await fetchData();
if(!data) return;

// feed
let feedHTML="";
data.logs.slice(0,5).forEach(l=>{
feedHTML+=`<p>${l.user} fez ${l.action} +${l.xp}</p>`;
});
document.getElementById("feed").innerHTML=feedHTML;

// ranking
let rankingHTML="";
Object.entries(data.users)
.sort((a,b)=>b[1]-a[1])
.forEach(([name,val])=>{
rankingHTML+=`<p>${name} — ${val} XP</p>`;
});
document.getElementById("ranking").innerHTML=rankingHTML;
}

// toast
function showToast(msg){
const el=document.getElementById("toast");
el.innerText="🔥 "+msg;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,2000);
}

update();
loadData();

</script>
</body>
</html>
