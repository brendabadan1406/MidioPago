<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MídioPago 🐉</title>

<!-- 🔊 SOM -->
<audio id="xpSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<style>
:root{
  --bg:#0a0d14;
  --card:#131722;
  --card2:#1b2030;
  --border:#262c3d;

  --text:#e8ecf1;
  --muted:#8b92a3;

  --primary:#4ADE80;
  --primary-dark:#16A34A;
  --accent:#F59E0B;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  display:flex;
  justify-content:center;
  padding:2rem;
}
.app{max-width:500px;width:100%}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.5rem;
  margin-bottom:1rem;
  text-align:center;
}

button{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:.6rem;
  color:white;
  cursor:pointer;
}
button:hover{background:#22263a}

.xp{
  background:var(--card2);
  height:10px;
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:var(--primary-dark);
}

.toast{
  text-align:center;
  margin-top:10px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <h2 id="stageName"></h2>
  <p id="stageDesc"></p>

  <div class="xp" style="margin-top:10px">
    <div id="xpFill" class="fill" style="width:0%"></div>
  </div>

  <p id="xpText"></p>
  <p id="nextXP" style="font-size:12px;color:var(--muted)"></p>
</div>

<div class="card">
  <button onclick="gainXP(20)">+20 XP</button>
</div>

<div id="toast" class="toast"></div>

</div>

<script>

const STAGES=[
{
name:"🍼 Jovem Aprendiz",
xp:0,
desc:"Aqui o Mídio Pago ainda está entendendo como o jogo funciona. O briefing chega meio nebuloso, os termos parecem um idioma novo e cada tarefa vira uma pequena descoberta. Ele observa, pergunta, testa e aprende constantemente."
},
{
name:"🐣 Estagiário",
xp:100,
desc:"Como Estagiário, o Mídio Pago começa a executar. As primeiras entregas saem, a ansiedade aparece e cada resultado vira aprendizado. É a fase onde a prática transforma teoria em experiência."
},
{
name:"💻 Analista",
xp:300,
desc:"Agora o Mídio Pago já entende o que está fazendo. Ele entrega com consistência, questiona números e começa a enxergar padrões. Execução vira análise e confiança começa a aparecer."
},
{
name:"🛡️ Especialista",
xp:700,
desc:"Como Especialista, o Mídio Pago não só executa, ele melhora. Identifica oportunidades, evita retrabalho e eleva o nível das entregas. Qualidade deixa de ser diferencial e passa a ser padrão."
},
{
name:"🧭 Coordenador",
xp:1500,
desc:"Aqui o Mídio Pago começa a olhar o todo. Ele conecta pessoas, organiza demandas e garante que as coisas fluam. Não é mais só sobre fazer, é sobre fazer o time funcionar."
},
{
name:"🪽 Gerente",
xp:3000,
desc:"Como Gerente, o Mídio Pago ganha visão. Ele questiona, prioriza e direciona. Entende que impacto vale mais do que volume e que estratégia guia as decisões."
},
{
name:"🧠 Superintendente",
xp:5000,
desc:"Agora o Mídio Pago enxerga antes de acontecer. Ele antecipa cenários, conecta áreas e toma decisões com clareza mesmo em ambientes complexos."
},
{
name:"👑 Pai de Todos",
xp:8000,
desc:"Aqui o Mídio Pago define o jogo. Suas decisões impactam o futuro e o trabalho deixa de ser tarefa para se tornar transformação."
}
];

let xp=0;

function getStage(){
  let s=0;
  for(let i=STAGES.length-1;i>=0;i--){
    if(xp>=STAGES[i].xp){s=i;break;}
  }
  return s;
}

function updateUI(){
  const s=getStage();
  const stage=STAGES[s];

  document.getElementById("stageName").innerText=stage.name;
  document.getElementById("stageDesc").innerText=stage.desc;

  const next=STAGES[s+1];
  const pct=next?((xp-stage.xp)/(next.xp-stage.xp))*100:100;

  document.getElementById("xpFill").style.width=pct+"%";
  document.getElementById("xpText").innerText=xp+" XP";

  if(next){
    document.getElementById("nextXP").innerText="Faltam "+(next.xp-xp)+" XP para próxima fase";
  }else{
    document.getElementById("nextXP").innerText="Nível máximo atingido";
  }
}

function gainXP(v){
  xp+=v;

  // 🔊 som
  const s=document.getElementById("xpSound");
  s.currentTime=0;
  s.play().catch(()=>{});

  showToast("+"+v+" XP");

  updateUI();
}

function showToast(msg){
  const el=document.getElementById("toast");
  el.innerText="🔥 Mandou bem! "+msg+" e você fortaleceu o time";
  el.style.opacity=1;

  setTimeout(()=>el.style.opacity=0,2000);
}

updateUI();

</script>

</body>
</html>
